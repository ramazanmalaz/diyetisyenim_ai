name: Bildirim cron (su + pomodoro) — YEDEK (devre dışı)

# DURUM: Birincil tetikleyici artık cron-job.org (gerçek dakikalık, güvenilir).
# GitHub Actions schedule GÜVENİLMEZ olduğu kanıtlandı (run'ları atlıyor / saatlerce
# "pending"de takılıyor), bu yüzden otomatik (schedule) çalışma KALDIRILDI.
# Bu workflow yalnızca ELLE (workflow_dispatch) çalışan bir acil yedek olarak duruyor;
# cron-job.org bir gün durursa buradan ~5 saatlik bir kapsama başlatılabilir.
#
# Gereken: repo secret CRON_SECRET (Settings → Secrets and variables → Actions).

on:
  workflow_dispatch: {}

concurrency:
  group: bildirim-cron
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: ~5 saat boyunca dakikalık tetikle (sonra sıradaki run devralır)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "HATA: CRON_SECRET repo secret'i tanımlı değil."
            exit 1
          fi
          URL="https://uzmandiyet.com/api/cron/notifications"
          END=$((SECONDS + 18000))   # ~5 saat
          n=0
          while [ "$SECONDS" -lt "$END" ]; do
            n=$((n + 1))
            if curl -fsS -m 30 -H "Authorization: Bearer $CRON_SECRET" "$URL" >/dev/null; then
              :
            else
              echo "$(date -u +%H:%M:%S) [$n] istek hatası (yok sayıldı)"
            fi
            sleep 60
          done
          echo "Döngü tamamlandı ($n tetikleme). Sıradaki run devralır."
