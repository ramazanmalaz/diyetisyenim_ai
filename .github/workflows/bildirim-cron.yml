name: Bildirim cron (su + pomodoro)

# Uygulama KAPALIYKEN de push bildirimi gönderir.
#
# GitHub Actions zamanlı (schedule) tetiklemeleri GÜVENİLMEZ: çoğu run atlanıyor,
# saatlerce hiç çalışmayabiliyor. Bu yüzden "kısa ama sık" yerine "uzun ve
# zincirleme" model kullanıyoruz:
#   - Her run ~5 saat boyunca endpoint'i 60 sn'de bir çağırır (≈dakikalık kapsama).
#   - concurrency (cancel-in-progress:false) ile aynı anda tek run çalışır; yeni
#     tetiklemeler "pending" bekl, biten run'ı hemen devralır → kesintisiz zincir.
#   - schedule sadece "sıradaki run hazır beklesin" diye var; bırakılsa bile
#     çalışan run zaten ~5 saat kapsıyor.
# Repo PUBLIC olduğundan Actions dakikaları ücretsiz/sınırsız.
#
# NOT: Beklemedeki run'lar 15 dk'da bir yenilenir → Actions sekmesinde "cancelled"
# girdiler GÖRÜNÜR; bu normaldir (işlevi etkilemez).
# NOT: GitHub uzun süreli döngüleri kısıtlayabilir; sorun olursa cron-job.org
# (gerçek dakikalık, ücretsiz) en sağlam alternatiftir.
#
# Gereken: repo secret CRON_SECRET (Settings → Secrets and variables → Actions).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: bildirim-cron
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: ~5 saat boyunca dakikalık tetikle (sonra sıradaki run devralır)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "HATA: CRON_SECRET repo secret'i tanımlı değil."
            exit 1
          fi
          URL="https://uzmandiyet.com/api/cron/notifications"
          END=$((SECONDS + 18000))   # ~5 saat
          n=0
          while [ "$SECONDS" -lt "$END" ]; do
            n=$((n + 1))
            if curl -fsS -m 30 -H "Authorization: Bearer $CRON_SECRET" "$URL" >/dev/null; then
              :
            else
              echo "$(date -u +%H:%M:%S) [$n] istek hatası (yok sayıldı)"
            fi
            sleep 60
          done
          echo "Döngü tamamlandı ($n tetikleme). Sıradaki run devralır."
