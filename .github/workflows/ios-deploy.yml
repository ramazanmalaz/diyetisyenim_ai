name: iOS — App Store Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      # ── 1. Kod al ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js kur ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── 3. Capacitor sync ──────────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync ios

      # ── 4. Sertifika yükle ─────────────────────────────────────────────────
      - name: Import certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/build_certificate.p12
          security import $RUNNER_TEMP/build_certificate.p12 \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # ── 5. Provisioning profile yükle ──────────────────────────────────────
      - name: Import provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 6. Xcode archive ───────────────────────────────────────────────────
      # Tag: v1.0.15 → MARKETING_VERSION=1.0.15, CURRENT_PROJECT_VERSION=15
      # CODE_SIGN_STYLE=Manual sadece pbxproj'daki App target'ında set edildi —
      # global CLI override yok, RevenueCat SPM Automatic'te kalıyor.
      - name: Build archive
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(echo "$TAG" | sed 's/^v//')
          BUILD=$(echo "$VERSION" | awk -F. '{print $NF}')
          echo "Marketing version: $VERSION  Build: $BUILD"

          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/UzmanDiyet.xcarchive \
            -destination "generic/platform=iOS" \
            APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_NAME="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD"

      # ── 7. Export IPA ──────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>TEAM_ID_PLACEHOLDER</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.uzmandiyet.app</key>
              <string>PROFILE_NAME_PLACEHOLDER</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          sed -i '' \
            "s/TEAM_ID_PLACEHOLDER/${{ secrets.APPLE_TEAM_ID }}/g" \
            $RUNNER_TEMP/ExportOptions.plist
          sed -i '' \
            "s/PROFILE_NAME_PLACEHOLDER/${{ secrets.PROVISIONING_PROFILE_NAME }}/g" \
            $RUNNER_TEMP/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/UzmanDiyet.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      # ── 8. App Store Connect'e yükle ───────────────────────────────────────
      - name: Find IPA
        id: ipa
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          echo "IPA: $IPA_PATH"
          if [ -z "$IPA_PATH" ]; then
            echo "HATA: IPA dosyası bulunamadı."
            exit 1
          fi
          echo "path=$IPA_PATH" >> $GITHUB_OUTPUT

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode \
            -o ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.path }}" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose

      # ── 9. Temizlik ────────────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
