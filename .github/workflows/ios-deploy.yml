name: iOS — App Store Deploy

on:
  push:
    tags:
      - "v*"          # v1.0.0 gibi bir tag push edilince tetiklenir
  workflow_dispatch:   # manuel başlatma

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      # ── 1. Kod al ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js kur ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── 3. Capacitor sync ──────────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync ios

      # ── 4. Sertifika yükle ─────────────────────────────────────────────────
      - name: Import certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/build_certificate.p12
          security import $RUNNER_TEMP/build_certificate.p12 \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # ── 5. ASC API key yaz ─────────────────────────────────────────────────
      # Archive + upload için aynı key kullanılır.
      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode \
            -o ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # ── 6. Xcode archive ───────────────────────────────────────────────────
      # CODE_SIGN_STYLE ve PROVISIONING_PROFILE_SPECIFIER kaldırıldı:
      # Global override tüm SPM paketlerine (RevenueCat dahil) uygulanıyor
      # ve "does not support provisioning profiles" hatasına yol açıyor.
      # -allowProvisioningUpdates + ASC API key ile Xcode otomatik yönetir.
      - name: Build archive
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/UzmanDiyet.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      # ── 7. Export IPA ──────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>TEAM_ID_PLACEHOLDER</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          # teamID'yi secret ile doldur
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${{ secrets.APPLE_TEAM_ID }}/g" $RUNNER_TEMP/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/UzmanDiyet.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      # ── 8. App Store Connect'e yükle ───────────────────────────────────────
      - name: Find IPA
        id: ipa
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          echo "IPA: $IPA_PATH"
          if [ -z "$IPA_PATH" ]; then
            echo "HATA: IPA dosyası bulunamadı."
            exit 1
          fi
          echo "path=$IPA_PATH" >> $GITHUB_OUTPUT

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.path }}" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose

      # ── 9. Temizlik ────────────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
